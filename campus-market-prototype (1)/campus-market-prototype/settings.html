<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号设置 - 校园轻集市</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/element-plus"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/common.css">
<style>
.settings-section { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
</style>
</head>
<body class="bg-slate-50 min-h-screen">
<div id="app">
<nav class="navbar">
<div class="nav-container">
<a href="home.html" class="logo"><el-icon :size="28"><shop /></el-icon><span>校园轻集市</span></a>
<div class="nav-links">
<a href="home.html"><el-icon :size="16"><home-filled /></el-icon> 首页</a>
<a href="category.html"><el-icon :size="16"><grid /></el-icon> 集市浏览</a>
<a href="publish.html"><el-icon :size="16"><circle-plus /></el-icon> 发布信息</a>
<a href="messages.html"><el-icon :size="16"><chat-dot-round /></el-icon> 消息</a>
</div>
<div class="flex items-center gap-4">
<a href="profile.html" class="flex items-center gap-2 text-white/90 hover:text-white transition">
<el-avatar :size="32" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop&crop=face"></el-avatar>
<span class="text-sm">张同学</span>
</a>
</div>
</div>
</nav>
<div class="page-container">
<div class="breadcrumb">
<a href="home.html">首页</a>
<el-icon><arrow-right /></el-icon>
<a href="profile.html">个人中心</a>
<el-icon><arrow-right /></el-icon>
<span>账号设置</span>
</div>
<h1 class="text-2xl font-bold text-slate-800 mb-6">账号设置</h1>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<div class="lg:col-span-2">
<div class="settings-section">
<h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><el-icon class="text-blue-600"><user /></el-icon> 基本信息</h2>
<el-form label-position="top">
<el-form-item label="头像">
<div class="flex items-center gap-4">
<el-avatar :size="80" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop&crop=face"></el-avatar>
<el-button size="small"><el-icon class="mr-1"><upload /></el-icon> 更换头像</el-button>
</div>
</el-form-item>
<el-form-item label="昵称">
<el-input v-model="form.nickname" placeholder="输入昵称" size="large"></el-input>
</el-form-item>
<div class="grid grid-cols-2 gap-4">
<el-form-item label="学院">
<el-input v-model="form.college" placeholder="输入学院" size="large"></el-input>
</el-form-item>
<el-form-item label="校区">
<el-select v-model="form.campus" placeholder="选择校区" size="large" class="w-full">
<el-option label="北校区" value="north"></el-option>
<el-option label="南校区" value="south"></el-option>
<el-option label="东校区" value="east"></el-option>
<el-option label="西校区" value="west"></el-option>
</el-select>
</el-form-item>
</div>
<el-form-item label="年级">
<el-select v-model="form.grade" placeholder="选择年级" size="large" class="w-full">
<el-option label="2024级" value="2024"></el-option>
<el-option label="2023级" value="2023"></el-option>
<el-option label="2022级" value="2022"></el-option>
<el-option label="2021级" value="2021"></el-option>
</el-select>
</el-form-item>
</el-form>
</div>
<div class="settings-section">
<h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><el-icon class="text-blue-600"><phone /></el-icon> 联系方式</h2>
<el-form label-position="top">
<el-form-item label="手机号">
<el-input v-model="form.phone" placeholder="输入手机号" size="large">
<template #append><el-button>更换</el-button></template>
</el-input>
</el-form-item>
<el-form-item label="微信号">
<el-input v-model="form.wechat" placeholder="输入微信号" size="large"></el-input>
</el-form-item>
<el-form-item label="QQ号">
<el-input v-model="form.qq" placeholder="输入QQ号" size="large"></el-input>
</el-form-item>
</el-form>
</div>
<div class="settings-section">
<h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><el-icon class="text-blue-600"><bell /></el-icon> 通知设置</h2>
<el-form label-position="top">
<el-form-item>
<el-switch v-model="form.notifyMessage" active-text="接收新消息通知"></el-switch>
</el-form-item>
<el-form-item>
<el-switch v-model="form.notifyFavorite" active-text="收藏信息更新通知"></el-switch>
</el-form-item>
<el-form-item>
<el-switch v-model="form.notifySystem" active-text="系统公告通知"></el-switch>
</el-form-item>
</el-form>
</div>
<div class="flex gap-4">
<el-button type="primary" size="large"><el-icon class="mr-1"><check /></el-icon> 保存设置</el-button>
<el-button size="large">重置</el-button>
</div>
</div>
<div class="lg:col-span-1">
<div class="bg-white rounded-xl p-6 border border-slate-100 shadow-sm mb-4">
<h3 class="font-bold text-slate-800 mb-4">安全设置</h3>
<div class="space-y-3">
<el-button class="w-full" text><el-icon class="mr-1"><lock /></el-icon> 修改密码</el-button>
<el-button class="w-full" text><el-icon class="mr-1"><shield /></el-icon> 隐私设置</el-button>
<el-button class="w-full" text type="danger"><el-icon class="mr-1"><delete /></el-icon> 注销账号</el-button>
</div>
</div>
<div class="bg-blue-50 rounded-xl p-6 border border-blue-200">
<h3 class="font-bold text-blue-800 mb-2">提示</h3>
<p class="text-sm text-blue-700">完善个人信息有助于提高信用分，增加交易成功率。</p>
</div>
</div>
</div>
</div>
<footer class="bg-slate-800 text-slate-400 py-8 mt-12">
<div class="page-container text-center"><p class="text-sm">校园轻集市 - 让校园生活更便捷</p></div>
</footer>
</div>
<script>
const { createApp, ref } = Vue;
const app = createApp({
setup() {
const form = ref({
nickname: '张同学', college: '外国语学院', campus: 'south', grade: '2024',
phone: '138****8888', wechat: 'zhang2024', qq: '123456789',
notifyMessage: true, notifyFavorite: true, notifySystem: true
});
return { form };
}
});
app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
